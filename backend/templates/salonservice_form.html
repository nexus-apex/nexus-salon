{% extends "base.html" %}
{% block title %}{% if editing %}Edit{% else %}New{% endif %} SalonService | NexusSalon{% endblock %}
{% block page_title %}{% if editing %}Edit SalonService{% else %}New SalonService{% endif %}{% endblock %}
{% block content %}
<div class="card" style="max-width:750px">
  <form method="post">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group">
        <label>Name</label>
        <input type="text" name="name" value="{{ record.name|default:'' }}">
      </div>
      <div class="form-group">
        <label>Category</label>
        <select name="category">
          <option value="haircut" {% if record.category == 'haircut' %}selected{% endif %}>Haircut</option>
          <option value="coloring" {% if record.category == 'coloring' %}selected{% endif %}>Coloring</option>
          <option value="facial" {% if record.category == 'facial' %}selected{% endif %}>Facial</option>
          <option value="massage" {% if record.category == 'massage' %}selected{% endif %}>Massage</option>
          <option value="nails" {% if record.category == 'nails' %}selected{% endif %}>Nails</option>
          <option value="waxing" {% if record.category == 'waxing' %}selected{% endif %}>Waxing</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Duration Mins</label>
        <input type="number" name="duration_mins" value="{{ record.duration_mins|default:'0' }}">
      </div>
      <div class="form-group">
        <label>Price</label>
        <input type="number" step="0.01" name="price" value="{{ record.price|default:'0' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Status</label>
        <select name="status">
          <option value="active" {% if record.status == 'active' %}selected{% endif %}>Active</option>
          <option value="inactive" {% if record.status == 'inactive' %}selected{% endif %}>Inactive</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea name="description">{{ record.description|default:'' }}</textarea>
    </div>

    <div style="display:flex;gap:0.75rem;margin-top:1rem">
      <button type="submit" class="btn btn-primary">{% if editing %}Update{% else %}Create{% endif %} SalonService</button>
      <a href="/salonservices/" class="btn" style="background:var(--border);color:var(--text)">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
